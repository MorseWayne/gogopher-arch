services:
  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: src/services/gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - sandbox-engine
      - postgres
      - redis
    environment:
      # 我们在代码里目前硬编码了 localhost，但在容器内应使用服务名
      # 之后我会修复 main.go 中的端口配置以读取这些环境变量
      - SANDBOX_URL=http://sandbox-engine:8081/execute
      - DB_URL=postgres://user:pass@postgres:5432/gogopher?sslmode=disable
      - REDIS_URL=redis:6337

  sandbox-engine:
    build:
      context: .
      dockerfile: src/services/sandbox-engine/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - REDIS_URL=redis:6337

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=gogopher
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
